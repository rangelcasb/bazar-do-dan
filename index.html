<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazar do Dan - Catálogo de Fogos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            color: #fff;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        header {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            padding: 40px 0;
            border-bottom: 3px solid #FFD700;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.1);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .logo-svg {
            width: 200px;
            height: auto;
        }

        .controls {
            background: #1a1a1a;
            padding: 25px 0;
            margin: 30px 0;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .controls-grid {
                grid-template-columns: 1fr;
            }
            .header-content {
                flex-direction: column;
                gap: 15px;
            }
            .logo-svg {
                width: 150px;
            }
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .control-group label {
            font-size: 13px;
            color: #FFD700;
            font-weight: 600;
            white-space: nowrap;
        }

        input[type="text"],
        input[type="range"],
        select {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 13px;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 150px;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.1);
        }

        input[type="range"] {
            padding: 0;
            cursor: pointer;
            flex: 1;
            min-width: 100px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 12px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #FFD700;
            display: block;
        }

        .stat-label {
            color: #999;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }

        .product-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            border-color: #FFD700;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.15);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
            border-bottom: 1px solid #333;
        }

        .product-info {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
            min-height: 40px;
            display: flex;
            align-items: center;
        }

        .product-details {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }

        .product-price-section {
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid #333;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: #E63946;
            margin-bottom: 8px;
        }

        .product-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 100px;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #0a0a0a;
            color: #FFD700;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            border-color: #FFD700;
            background: #FFD700;
            color: #000;
        }

        .btn.cart {
            color: #E63946;
            border-color: #E63946;
        }

        .btn.cart:hover {
            background: #E63946;
            color: #fff;
        }

        .btn.whatsapp {
            color: #25D366;
            border-color: #25D366;
        }

        .btn.whatsapp:hover {
            background: #25D366;
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .badge {
            display: inline-block;
            background: #E63946;
            color: #fff;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .cart-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #E63946;
            color: #fff;
            padding: 16px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 16px rgba(230, 57, 70, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 99;
        }

        .cart-indicator:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(230, 57, 70, 0.4);
        }

        @media (max-width: 480px) {
            .cart-indicator {
                padding: 12px 16px;
                font-size: 12px;
                bottom: 15px;
                right: 15px;
            }
        }

        footer {
            background: #0a0a0a;
            border-top: 1px solid #333;
            padding: 30px 0;
            margin-top: 60px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }

        .footer-note {
            color: #FFD700;
            font-weight: 600;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <svg class="logo-svg" viewBox="0 0 800 250" role="img">
                    <title>Bazar do Dan - Logo com Fogos</title>
                    <defs>
                        <style>
                            .logo-text-main { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 72px; font-weight: 800; }
                            .logo-text-dan { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 72px; font-weight: 800; }
                        </style>
                    </defs>

                    <g id="fogos-esquerda">
                        <line x1="150" y1="80" x2="130" y2="50" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
                        <line x1="150" y1="80" x2="140" y2="45" stroke="#FFA500" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="150" y1="80" x2="160" y2="40" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="150" y1="80" x2="175" y2="50" stroke="#FFA500" stroke-width="3" stroke-linecap="round"/>
                        <line x1="150" y1="80" x2="165" y2="35" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
                        
                        <circle cx="130" cy="50" r="4" fill="#FFD700"/>
                        <circle cx="140" cy="45" r="3" fill="#FFA500"/>
                        <circle cx="160" cy="40" r="3" fill="#FFD700"/>
                        <circle cx="175" cy="50" r="4" fill="#FFA500"/>
                        <circle cx="165" cy="35" r="3" fill="#FFD700"/>
                        
                        <circle cx="150" cy="80" r="6" fill="#FFD700"/>
                    </g>

                    <g id="fogos-direita">
                        <line x1="650" y1="80" x2="630" y2="50" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
                        <line x1="650" y1="80" x2="640" y2="45" stroke="#FFA500" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="650" y1="80" x2="660" y2="40" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="650" y1="80" x2="675" y2="50" stroke="#FFA500" stroke-width="3" stroke-linecap="round"/>
                        <line x1="650" y1="80" x2="665" y2="35" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
                        
                        <circle cx="630" cy="50" r="4" fill="#FFD700"/>
                        <circle cx="640" cy="45" r="3" fill="#FFA500"/>
                        <circle cx="660" cy="40" r="3" fill="#FFD700"/>
                        <circle cx="675" cy="50" r="4" fill="#FFA500"/>
                        <circle cx="665" cy="35" r="3" fill="#FFD700"/>
                        
                        <circle cx="650" cy="80" r="6" fill="#FFD700"/>
                    </g>

                    <text x="400" y="110" class="logo-text-main" fill="white" text-anchor="middle">BAZAR</text>
                    <text x="400" y="165" class="logo-text-dan" text-anchor="middle">
                        <tspan fill="white">DO </tspan><tspan fill="#FFD700">DAN</tspan>
                    </text>

                    <line x1="200" y1="185" x2="600" y2="185" stroke="#FFD700" stroke-width="2" opacity="0.8"/>
                    <text x="400" y="215" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 2px; fill: #FFA500;" text-anchor="middle">MELHORES PREÇOS</text>
                </svg>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="controls">
            <div class="controls-grid">
                <div class="control-group">
                    <label>🔍 Buscar</label>
                    <input type="text" id="searchInput" placeholder="Digite o nome...">
                </div>
                <div class="control-group">
                    <label>💰 Preço</label>
                    <input type="range" id="priceRange" min="0" max="100" value="100">
                    <span id="priceValue">Até R$ 100</span>
                </div>
            </div>
            <div class="control-group">
                <label>📂 Categoria</label>
                <select id="categoryFilter">
                    <option value="">Todas as Categorias</option>
                    <option value="Estalos">Estalos</option>
                    <option value="Bombas">Bombas</option>
                    <option value="Traques">Traques</option>
                    <option value="Chuvinhas">Chuvinhas</option>
                    <option value="Aviões">Aviões</option>
                    <option value="Especiais">Especiais</option>
                </select>
            </div>
            <div class="stats">
                <div class="stat">
                    <span class="stat-value" id="totalProducts">0</span>
                    <span class="stat-label">Produtos</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="cartCount">0</span>
                    <span class="stat-label">No Carrinho</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="totalValue">R$ 0</span>
                    <span class="stat-label">Valor Total</span>
                </div>
            </div>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <div class="cart-indicator" id="cartIndicator" style="display: none;">
        <span id="cartIndicatorText">Carrinho: 0 itens</span>
    </div>

    <footer>
        <div class="container">
            <div class="footer-note">🎆 Bazar do Dan - Acessível & Popular 🎆</div>
            <p>Fogos de artifício de qualidade com os melhores preços de Maceió</p>
            <p>Todos os produtos sujeitos a alterações de preços | ⚖️ Lei Estadual nº 9.146/2024</p>
        </div>
    </footer>

    <script>
        const products = [
            { id: 1, name: "Estalo Bebê Aliança", unidades: "80 unidades", preco: 8.00, categoria: "Estalos", badge: "Mais vendido" },
            { id: 2, name: "Estalo Bebê Aliança", unidades: "100 unidades", preco: 9.00, categoria: "Estalos" },
            { id: 3, name: "Mariposa", unidades: "12 unidades", preco: 12.00, categoria: "Estalos" },
            { id: 4, name: "Estalo Bebê Aliada Guarany", unidades: "100 unidades", preco: 9.00, categoria: "Estalos" },
            { id: 5, name: "Bengalinhas", unidades: "25 unidades", preco: 6.00, categoria: "Chuvinhas" },
            { id: 6, name: "Vulcão", unidades: "2 unidades", preco: 23.00, categoria: "Especiais", badge: "Premium" },
            { id: 7, name: "Mini Vulcão", unidades: "6 unidades", preco: 25.00, categoria: "Especiais" },
            { id: 8, name: "Fonte de Crack", unidades: "6 unidades", preco: 25.00, categoria: "Especiais" },
            { id: 9, name: "Rajadinho", unidades: "6 unidades", preco: 4.00, categoria: "Traques", badge: "Promoção" },
            { id: 10, name: "Bola Brasil", unidades: "1 unidade", preco: 4.00, categoria: "Brinquedos" },
            { id: 11, name: "Pião Maluco", unidades: "3 unidades", preco: 6.00, categoria: "Brinquedos" },
            { id: 12, name: "Apito Vara", unidades: "12 unidades", preco: 20.00, categoria: "Acessórios" },
            { id: 13, name: "Caneta Rojãozinho", unidades: "12 unidades", preco: 9.00, categoria: "Traques" },
            { id: 14, name: "Bomba Nº4", unidades: "20 unidades", preco: 12.00, categoria: "Bombas", badge: "Popular" },
            { id: 15, name: "Chuvinha P/M/G", unidades: "12 unidades", preco: 8.50, categoria: "Chuvinhas" },
            { id: 16, name: "Abelinha", unidades: "8 unidades", preco: 9.00, categoria: "Aviões" },
            { id: 17, name: "Libélula", unidades: "12 unidades", preco: 14.00, categoria: "Aviões" },
            { id: 18, name: "Flor (25 tiros)", unidades: "1 unidade", preco: 30.00, categoria: "Especiais", badge: "Destaque" },
        ];

        let cart = [];
        const whatsappNumber = "5582999999999";

        function renderProducts(filtered = products) {
            const grid = document.getElementById('productsGrid');
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;"><p>Nenhum produto encontrado</p></div>`;
                document.getElementById('totalProducts').textContent = '0';
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    ${p.badge ? `<div style="padding: 12px; background: #2a2a2a; border-bottom: 1px solid #333;"><span class="badge">${p.badge}</span></div>` : ''}
                    <div class="product-image">Imagem do Produto</div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-details">${p.unidades}</div>
                        <div class="product-price-section">
                            <div class="product-price">R$ ${p.preco.toFixed(2)}</div>
                            <div class="product-actions">
                                <button class="btn" onclick="addToCart(${p.id})">+ Carrinho</button>
                                <button class="btn whatsapp" onclick="shareWhatsApp('${p.name}', ${p.preco})">📱</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('totalProducts').textContent = filtered.length;
        }

        function filterProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const maxPrice = parseFloat(document.getElementById('priceRange').value);
            const category = document.getElementById('categoryFilter').value;

            let filtered = products.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search);
                const matchPrice = p.preco <= maxPrice;
                const matchCategory = !category || p.categoria === category;
                return matchSearch && matchPrice && matchCategory;
            });

            renderProducts(filtered);
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(c => c.id === id);
            
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartDisplay();
        }

        function shareWhatsApp(name, price) {
            const text = `Olá! Vi esse produto no Bazar do Dan:\n\n${name}\nR$ ${price.toFixed(2)}\n\nTem interesse?`;
            const encoded = encodeURIComponent(text);
            window.open(`https://wa.me/${whatsappNumber}?text=${encoded}`, '_blank');
        }

        function updateCartDisplay() {
            const count = cart.reduce((acc, item) => acc + item.quantity, 0);
            const total = cart.reduce((acc, item) => acc + (item.preco * item.quantity), 0);
            
            document.getElementById('cartCount').textContent = count;
            document.getElementById('totalValue').textContent = `R$ ${total.toFixed(2)}`;
            
            if (count > 0) {
                document.getElementById('cartIndicator').style.display = 'block';
                document.getElementById('cartIndicatorText').textContent = `Carrinho: ${count} itens - R$ ${total.toFixed(2)}`;
            } else {
                document.getElementById('cartIndicator').style.display = 'none';
            }
        }

        document.getElementById('searchInput').addEventListener('input', filterProducts);
        document.getElementById('priceRange').addEventListener('input', (e) => {
            document.getElementById('priceValue').textContent = `Até R$ ${e.target.value}`;
            filterProducts();
        });
        document.getElementById('categoryFilter').addEventListener('change', filterProducts);
        document.getElementById('cartIndicator').addEventListener('click', () => {
            if (cart.length > 0) {
                const items = cart.map(item => `${item.name} (${item.quantity}x R$ ${item.preco.toFixed(2)})`).join('\n');
                const total = cart.reduce((acc, item) => acc + (item.preco * item.quantity), 0);
                const text = `Olá! Gostaria de fazer um pedido:\n\n${items}\n\nTotal: R$ ${total.toFixed(2)}`;
                const encoded = encodeURIComponent(text);
                window.open(`https://wa.me/${whatsappNumber}?text=${encoded}`, '_blank');
            }
        });

        renderProducts();
    </script>
</body>
</html>
